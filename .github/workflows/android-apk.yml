name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./android

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Update version
      if: github.event.inputs.version != ''
      run: |
        sed -i "s/versionName = \".*\"/versionName = \"${{ github.event.inputs.version }}\"/" app/build.gradle.kts

    - name: Build APK (Debug)
      run: ./gradlew assembleDebug

    - name: Build APK (Release)
      run: ./gradlew assembleRelease

    - name: Sign Release APK
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app/build/outputs/apk/release/app-release-unsigned.apk "$KEY_ALIAS"
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/PIC-Gestion-Comercial-signed.apk
        fi

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PIC-APK-${{ github.sha }}
        path: |
          android/app/build/outputs/apk/debug/*.apk
          android/app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/PIC-Gestion-Comercial-signed.apk
        body: |
          ## PIC Gestión Comercial - Android APK

          ### Instalación
          1. Descarga el APK
          2. Habilita "Instalar apps desconocidas" en Ajustes > Seguridad
          3. Abre el archivo APK e instala

          ### Configuración inicial
          Al abrir la app, ve a Ajustes (menú) y configura la URL del servidor.
